<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js" defer></script>
</head>
<body>
    <div class="calculadora">
        <div id="display">0</div>
        <div class="buttons">
            <button type="button" id="ac" class="command">AC</button>
            <button type="button" id="backspace" class="command">&#9003</button> <!--backspace-->
            <button type="button" id="percent">&percnt;</button>
            <button type="button" data-value='÷' id="divide" class="operation">&divide;</button>
            <button type="button" data-value="7" class="number">7</button>
            <button type="button" data-value="8" class="number">8</button>
            <button type="button" data-value="9" class="number">9</button>
            <button type="button" data-value='x' id="multiply" class="operation">&times;</button>
            <button type="button" data-value="4" class="number">4</button>
            <button type="button" data-value="5" class="number">5</button>
            <button type="button" data-value="6" class="number">6</button>
            <button type="button" data-value='-' id="minus" class="operation">&minus;</button>
            <button type="button" data-value="1" class="number">1</button>
            <button type="button" data-value="2" class="number">2</button>
            <button type="button" data-value="3" class="number">3</button>
            <button type="button" data-value='+' id="plus" class="operation">&plus;</button>
            <button type="button" data-value="0" id="zero" class="number">0</button>
            <button type="button" data-value="," id="comma">&comma;</button>
            <button type="button" id="equals" class="command">&equals;</button>
        </div>
    </div>
</body>
</html>
